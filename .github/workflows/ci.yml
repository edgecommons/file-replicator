name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo. `secrets: inherit` passes the org-level
    # EDGECOMMONS_READ_TOKEN so cargo can fetch the private edgecommons git dependency. The repo must be
    # added to that secret's repository allow-list (org Actions secrets, via the REST API).
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
      # Compile + test the shippable destination backends as they land. `dest-s3` (P2) is also in the
      # crate default set, but naming it here keeps CI explicit as more P5 backends are added.
      # Comma-separated (not space-separated): the reusable workflow splices this unquoted into
      # `cargo build --all-targets --features $RUST_FEATURES`, so a space-separated list would word-
      # split into extra positional args. `dest-sftp`/`dest-ftps`/`dest-azure`/`dest-gcs` (P5) compile +
      # unit-test here; their simulator-backed integration tests are **probe-only** — each first checks
      # whether its simulator port is already listening and, if not, self-skips (`eprintln!` + return),
      # so nothing is `docker run`-provisioned in this job (auto-starting a throwaway container is opt-in
      # via `FR_START_SIMULATORS=1`, never set in CI — it would burn Actions minutes and risk fixed-host-
      # port collisions / image-pull failures). `dest-http` (P5) compiles + unit-tests here too; its
      # integration test (`tests/http_inprocess.rs`) needs no simulator (an in-process server), so it
      # always runs, included here.
      rust-features: "dest-s3,dest-sftp,dest-ftps,dest-http,dest-azure,dest-gcs"
    secrets: inherit

  coverage:
    # The 90% line-coverage gate (NFR-2 / DESIGN §18 / CLAUDE.md), actually RUN here (the reusable
    # component-ci only does build/test/clippy). Excluded from the denominator: the live-infra SDK/
    # protocol-call seams `dest/{s3,sftp,ftps,http,azure,gcs}/client.rs` (like edgecommons excludes
    # `testutil.rs`) AND every simulator-backed integration-test file (`tests/s3_floci.rs`,
    # `tests/p3_control_emqx.rs`, `tests/sftp_atmoz.rs`, `tests/azure_azurite.rs`,
    # `tests/gcs_fakegcs.rs`, `tests/http_inprocess.rs`, `tests/p6_fanout.rs`, `tests/s3_real.rs`
    # [opt-in real-AWS, FR_S3_REAL_BUCKET]) — this job provisions no floci/EMQX/docker-sftp/
    # azurite/fake-gcs-server and the P5 tests are probe-only (they self-skip when their port is down;
    # auto-start is opt-in via `FR_START_SIMULATORS=1`, never set here), so those bodies partly do not
    # run and would otherwise erode the margin. `http_inprocess.rs` is excluded too: although its
    # in-process server always runs, its `TestServer` has error branches (405/400/416/404) the happy-path
    # scenario never exercises, so folding a large partly-covered test-support file into the denominator
    # would drag the aggregate DOWN. The **unit tests** must meet the 90% floor on their own.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Authenticate to the private edgecommons git dependency
        env:
          # Same org read token the reusable workflow uses (secrets: inherit); the repo must be on that
          # secret's allow-list. Rewrites the https git URL so cargo can fetch the private dep.
          EDGECOMMONS_READ_TOKEN: ${{ secrets.EDGECOMMONS_READ_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/edgecommons/edgecommons.git".insteadOf \
            "https://github.com/edgecommons/edgecommons.git"
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/edgecommons/edgecommons".insteadOf \
            "https://github.com/edgecommons/edgecommons"
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Coverage gate (90% lines; SDK/protocol-call seams + self-skipping integration tests excluded)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: >
          cargo llvm-cov --features dest-s3,dest-sftp,dest-ftps,dest-http,dest-azure,dest-gcs
          --ignore-filename-regex '(testutil|dest.(s3|sftp|ftps|http|azure|gcs).client|p3_control_emqx|s3_floci|sftp_atmoz|azure_azurite|gcs_fakegcs|http_inprocess|p6_fanout|s3_real)\.rs'
          --fail-under-lines 90

name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo. `secrets: inherit` passes the org-level
    # EDGECOMMONS_READ_TOKEN so cargo can fetch the private ggcommons git dependency. The repo must be
    # added to that secret's repository allow-list (org Actions secrets, via the REST API).
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
      # Compile + test the shippable destination backends as they land. `dest-s3` (P2) is also in the
      # crate default set, but naming it here keeps CI explicit as `dest-sftp`/`dest-http` (P5) are
      # added.
      rust-features: "dest-s3"
    secrets: inherit

  coverage:
    # The 90% line-coverage gate (NFR-2 / DESIGN §18 / CLAUDE.md), actually RUN here (the reusable
    # component-ci only does build/test/clippy). Excluded from the denominator: `dest/s3/client.rs` (the
    # live-infra S3 SDK-call seam, like ggcommons excludes `testutil.rs`) AND the self-skipping
    # integration-test files (`tests/s3_floci.rs`, `tests/p3_control_emqx.rs`) — this coverage job
    # provisions no floci/EMQX, so those tests early-return and their (large) bodies would otherwise
    # count as uncovered, eroding the margin the gate is meant to rest on. The UNIT tests must meet the
    # floor on their own.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Authenticate to the private ggcommons git dependency
        env:
          # Same org read token the reusable workflow uses (secrets: inherit); the repo must be on that
          # secret's allow-list. Rewrites the https git URL so cargo can fetch the private dep.
          EDGECOMMONS_READ_TOKEN: ${{ secrets.EDGECOMMONS_READ_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Coverage gate (90% lines; S3 SDK-call seam + self-skipping integration tests excluded)
        run: >
          cargo llvm-cov --features dest-s3
          --ignore-filename-regex '(testutil|dest.s3.client|p3_control_emqx|s3_floci)\.rs'
          --fail-under-lines 90

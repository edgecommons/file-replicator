---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.mbreissi.greengrass.FileReplicator"
ComponentVersion: "1.0.0"
ComponentDescription: "EdgeCommons file-replicator: watches directories and replicates files to local/S3 destinations on arrival or on cron schedules/windows."
ComponentPublisher: "EdgeCommons"
# S3 device-role credentials (ambient, DESIGN §11.5) land with the S3 destination in P2 — add then:
#   ComponentDependencies:
#     aws.greengrass.TokenExchangeService:
#       VersionRequirement: ">=2.0.0 <3.0.0"
#       DependencyType: HARD
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        rust_format: "{timestamp} [{level}] {target} - {message}"
      heartbeat:
        intervalSecs: 5
        targets:
          - type: "metric"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "log"
        namespace: "filereplicator"
        targetConfig:
          logFileName: "/greengrass/v2/work/{ComponentFullName}/metric.log"
      tags:
        appId: "Test"
        site: "Chantilly"
      component:
        global:
          limits:
            maxConcurrentFiles: 8
        # Each instance = one watched directory (ingress/egress/schedule/completion/retry/limits).
        # See DESIGN.md §7 for the full shape. Empty by default.
        instances: []
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.greengrass.FileReplicator:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all local topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "com.mbreissi.greengrass.FileReplicator:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "com.mbreissi.greengrass.FileReplicator:shadow:1":
          policyDescription: Allows access to thing shadows.
          operations:
            - "aws.greengrass#GetThingShadow"
            - "aws.greengrass#UpdateThingShadow"
            - "aws.greengrass#DeleteThingShadow"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/file-replicator"
    Lifecycle:
      Install:
        Script: "chmod +x {artifacts:path}/file-replicator"
      Run:
        Script: "{artifacts:path}/file-replicator --platform GREENGRASS -c GG_CONFIG"
